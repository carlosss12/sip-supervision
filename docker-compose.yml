services:
  sip_db:
    image: postgres:15-alpine
    container_name: sip_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sip_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  sip_backend:
    build: ./backend
    container_name: sip_backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgres://postgres:password@sip_db:5432/sip_db
    depends_on:
      sip_db:
        condition: service_healthy


  sip_frontend:
    build: ./frontend
    container_name: sip_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - sip_backend

volumes:
  pgdata: